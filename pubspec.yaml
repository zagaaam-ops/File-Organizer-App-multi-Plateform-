name: fast_file_organizer
description: >
  The fastest cross-platform file organizer built for organizing,
  not browsing.

publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1

  go_router: ^14.2.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  path: ^1.9.0
  path_provider: ^2.1.3

  file_picker: ^8.0.7

  intl: ^0.19.0

  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
